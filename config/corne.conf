CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable 2M PHY for more stable BLE connection between halves
CONFIG_BT_CTLR_PHY_2M=n

# Prevent sleep to avoid disconnections (set to 30 minutes = 1800000ms, or disable with 0)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Increase the stack and queue size for better split communication
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_QUEUE_SIZE=20

# ===== LOGGING SETTINGS =====
# Enable USB logging to view debug messages via serial console
CONFIG_ZMK_USB_LOGGING=y

# Enable logging subsystem
CONFIG_LOG=y

# Set log level to debug (shows detailed information)
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Enable specific module logging for troubleshooting
CONFIG_ZMK_BLE_LOG_LEVEL_DBG=y
CONFIG_BT_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_BLE_LOG_LEVEL_DBG=y

# Increase log buffer size to capture more messages
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_STRDUP_BUF_COUNT=32
CONFIG_LOG_STRDUP_MAX_STRING=64

CONFIG_ZMK_KEYBOARD_NAME="EddCodeOnePiece"
